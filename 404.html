<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      (function () {
        var routeRoots = {
          issues: true,
          progress: true,
          meetings: true,
          announcements: true,
          policies: true,
          about: true,
          contact: true,
          photos: true,
          data: true,
          search: true
        }
        var segments = window.location.pathname.split('/').filter(Boolean)
        var basePath = '/'
        if (segments.length > 0 && !routeRoots[segments[0]]) {
          basePath = '/' + segments[0] + '/'
        }
        var routePath = window.location.pathname + window.location.search + window.location.hash
        window.location.replace(basePath + '?__redirect__=' + encodeURIComponent(routePath))
      })()
    </script>
  </body>
</html>
